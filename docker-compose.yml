services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BASE_URL: ${VITE_BASE_URL}
    volumes:
      - frontend-dist:/target
    networks:
      - app-network

  frontend-nginx:
    image: nginx:alpine
    ports:
      - "9001:80"
    volumes:
      - frontend-dist:/usr/share/nginx/html:ro
      - ./nginx/frontend-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

volumes:
  frontend-dist:

networks:
  app-network:
    external: true
